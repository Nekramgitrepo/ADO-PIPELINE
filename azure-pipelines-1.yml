trigger:
 branches:
   include:
    - main

pool: nekramagent
  
stages:
  - stage: 
    displayName: TerraformRG
    jobs:
      - job: 
        displayName: Terraform init plan apply
        steps:
          - task: tfsec@1
            inputs:
              version: 'v1.26.0'
          - task: TerraformInstaller@1
            inputs:
              terraformVersion: '4.80.0'
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'init'
              backendServiceArm: 'nekram svc'
              backendAzureRmResourceGroupName: 'dev-rgnew'
              backendAzureRmStorageAccountName: 'devstorageado'
              backendAzureRmContainerName: 'adocontainer'
              backendAzureRmKey: 'david.tfstate'
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'plan'
              environmentServiceNameAzureRM: 'nekram svc'
          - task: TerraformTask@5
            inputs:
              provider: 'azurerm'
              command: 'apply'
              commandOptions: '-auto-approve'
              environmentServiceNameAzureRM: 'nekram svc'


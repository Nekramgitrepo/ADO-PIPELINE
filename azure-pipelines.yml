trigger:
 branches:
   include:
     - main

pool: nekramagent
 
stages:
  - stage: Terraform
    displayName: Terraform Infra Pipeline
    jobs:
      - job: terraformjob 
        displayName: Terraform init plan
        steps:
        - task: TerraformInstaller@1
          inputs:
            terraformVersion: 'latest'
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'init'
            backendServiceArm: 'nekram svc'
            backendAzureRmResourceGroupName: 'dev-rgnew'
            backendAzureRmStorageAccountName: 'devstorageado'
            backendAzureRmContainerName: 'adocontainer'
            backendAzureRmKey: 'terraform.tfstate'
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'plan'
            environmentServiceNameAzureRM: 'nekram svc'
  - stage: Terraformapply
    displayName: Terraform apply
    jobs:
      - job: Terraformjob1
        displayName: Terraformapply
        steps:
        - task: TerraformInstaller@1
          inputs:
            terraformVersion: 'latest'
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'init'
            backendServiceArm: 'nekram svc'
            backendAzureRmResourceGroupName: 'dev-rgnew'
            backendAzureRmStorageAccountName: 'devstorageado'
            backendAzureRmContainerName: 'adocontainer'
            backendAzureRmKey: 'terraform.tfstate'
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'apply'
            commandOptions: '-auto-approve'
            environmentServiceNameAzureRM: 'nekram svc'
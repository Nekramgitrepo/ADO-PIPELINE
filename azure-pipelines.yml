trigger:
 branches:
   include:
     - main

pool: nekramagent
 
stages:
  - stage: Terraform
    displayName: Terraform Infra Pipeline
    jobs:
      - job: terraformjob 
        displayName: Terraform init plan
        steps:
        - task: TerraformInstaller@1
          inputs:
            terraformVersion: 'latest'
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'init'
            backendServiceArm: 'nekram svc'
            backendAzureRmResourceGroupName: 'RG-DEV'
            backendAzureRmStorageAccountName: 'vikrantstorage9987'
            backendAzureRmContainerName: 'pravinnekramvikram'
            backendAzureRmKey: 'terraform.tfstate'
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'plan'
            environmentServiceNameAzureRM: 'nekram svc'
        - task: TerraformTask@5
          inputs:
            provider: 'azurerm'
            command: 'apply'
            commandOptions: '-auto-approve'
            environmentServiceNameAzureRM: 'nekram svc'